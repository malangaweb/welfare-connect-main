name: malanga_welfare_companion
description: Flutter companion app for Malanga Welfare.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^3.3.1
  state_notifier: ^1.0.0
  
  # Navigation
  go_router: ^17.2.2
  
  # Backend
  supabase_flutter: ^2.6.0
  
  # Storage & Security
  flutter_secure_storage: ^10.0.0
  
  # HTTP Client
  dio: ^5.7.0
  
  # Local Database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Connectivity
  connectivity_plus: ^7.1.1
  
  # Push Notifications
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  
  # Utilities
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_dotenv: ^6.0.1

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/splash.png
    - .env

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon_foreground.png
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/branding/app_icon_foreground.png
    background_color: "#FFFFFF"
    theme_color: "#1F3556"
  windows:
    generate: true
    image_path: assets/branding/app_icon_foreground.png
  macos:
    generate: true
    image_path: assets/branding/app_icon_foreground.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash.png
  android_12:
    image: assets/branding/app_icon_foreground.png
    icon_background_color: "#FFFFFF"
