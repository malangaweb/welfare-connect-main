<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#263143",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-primary-fixed-variant": "#2e4e2b",
                        "outline-variant": "#c3c8bd",
                        "inverse-on-surface": "#ecf1ff",
                        "on-surface": "#111c2d",
                        "on-secondary-fixed": "#131b2e",
                        "error-container": "#ffdad6",
                        "secondary-container": "#dae2fd",
                        "surface": "#f9f9ff",
                        "on-surface-variant": "#434840",
                        "on-error-container": "#93000a",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#d8e3fb",
                        "surface-bright": "#f9f9ff",
                        "inverse-primary": "#abd0a3",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#eaad64",
                        "primary-container": "#31512e",
                        "on-primary-fixed": "#022105",
                        "tertiary-fixed-dim": "#f9ba70",
                        "tertiary-container": "#6a4000",
                        "on-secondary-fixed-variant": "#3f465c",
                        "surface-container-high": "#dee8ff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "tertiary-fixed": "#ffddb9",
                        "surface-tint": "#456641",
                        "primary": "#1b3a19",
                        "on-tertiary-fixed-variant": "#663e00",
                        "tertiary": "#4b2c00",
                        "surface-container": "#e7eeff",
                        "primary-fixed-dim": "#abd0a3",
                        "on-tertiary-fixed": "#2b1700",
                        "surface-variant": "#d8e3fb",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#9ec396",
                        "secondary-fixed": "#dae2fd",
                        "on-secondary-container": "#5c647a",
                        "secondary": "#565e74",
                        "on-background": "#111c2d",
                        "surface-dim": "#cfdaf2",
                        "outline": "#73796f",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section_gap": "32px",
                        "base_unit": "8px",
                        "card_padding": "20px",
                        "gutter": "16px",
                        "margin_edge": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "label-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "title-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "display-lg": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9f9ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-gradient-to-r from-[#31512E] to-[#628A49] shadow-[0_8px_30px_rgb(15,23,42,0.12)] rounded-b-[24px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white/20">
<img alt="user profile picture" class="w-full h-full object-cover" data-alt="close-up portrait of a professional woman with a warm smile, soft natural lighting, high-end corporate style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGmBGFP2tBSWE7FveR_qzrJ776S476YDacFeA_TlOhscT1D3x4kTRYrmtOvRfAseEIxkJL26cRZvEtWKKVlCPaNJWYT6cQWNLsWWCW_TIXfVNunTJkHjxlKN62RkMDbms1eRp6Z-g0ZEsTpTIEH25D1wNZsnxchj16al3FPH2w_HxzqvKyneVS6Xd2V3ZRX_DO9sdTZhQTnZux3IcBdrTeZ9XeSFcwImO6fW3hEcG6EtidRXTNcc4nUslfT1TwLmVoNmFo5Kl-_oA"/>
</div>
<span class="text-xl font-bold text-white font-headline-lg">Welfare Portal</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-white hover:bg-white/10 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="mt-28 px-margin_edge space-y-gutter">
<!-- Info Banner (Gold Gradient) -->
<section class="w-full p-card_padding rounded-[24px] bg-gradient-to-br from-[#C38741] to-[#F0E3D2] shadow-lg relative overflow-hidden">
<div class="relative z-10">
<h1 class="font-headline-md text-headline-md text-[#1b3a19] mb-1">Quick Payment</h1>
<p class="font-body-md text-body-md text-[#1b3a19]/80">Initiate M-Pesa STK Push</p>
</div>
<!-- Decorative element -->
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-[120px]" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
</section>
<!-- Form Card -->
<section class="bg-surface-container-lowest p-card_padding rounded-[16px] shadow-[0_4px_20px_0px_rgba(15,23,42,0.06)] border border-[#E9EEF5]">
<form class="space-y-6">
<!-- Phone Number -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1">Phone number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]" data-icon="smartphone">smartphone</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-on-background/5 border-none rounded-[16px] focus:ring-0 focus:border-b-2 focus:border-primary-container transition-all font-body-lg text-on-surface placeholder:text-on-surface-variant/40" placeholder="0712 345 678" type="tel"/>
</div>
</div>
<!-- Amount -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1">Amount</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]" data-icon="payments">payments</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-on-background/5 border-none rounded-[16px] focus:ring-0 focus:border-b-2 focus:border-primary-container transition-all font-body-lg text-on-surface placeholder:text-on-surface-variant/40" placeholder="KES 0.00" type="number"/>
</div>
</div>
<!-- Account Reference -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1">Account Reference</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center text-on-surface-variant/60">
<span class="material-symbols-outlined text-[20px]" data-icon="receipt_long">receipt_long</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-on-background/5 border-none rounded-[16px] focus:ring-0 focus:border-b-2 focus:border-primary-container transition-all font-body-lg text-on-surface placeholder:text-on-surface-variant/40" placeholder="e.g. Welfare-001" type="text"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-5 bg-[#151311] text-white rounded-[16px] font-headline-md text-label-lg shadow-xl hover:opacity-90 active:scale-95 transition-all duration-200 mt-4 flex items-center justify-center gap-2" type="submit">
<span>Initiate STK Push</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</section>
<!-- Contextual Help Card -->
<section class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-high p-4 rounded-[24px] flex flex-col gap-2">
<span class="material-symbols-outlined text-primary-container" data-icon="verified_user">verified_user</span>
<span class="font-label-lg text-primary-container">Secure Transaction</span>
<span class="font-body-md text-on-surface-variant text-[12px]">Encrypted end-to-end</span>
</div>
<div class="bg-surface-container-high p-4 rounded-[24px] flex flex-col gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="history">history</span>
<span class="font-label-lg text-tertiary">History</span>
<span class="font-body-md text-on-surface-variant text-[12px]">View past payments</span>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-4 bg-[#0F172A] rounded-t-[32px] shadow-[0_-4px_20px_0px_rgba(0,0,0,0.3)] border-t border-white/5">
<a class="flex flex-col items-center justify-center text-slate-400 opacity-60 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-wider mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-amber-500 relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-amber-500 after:rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-wider mt-1">Cases</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 opacity-60 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="widgets">widgets</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-wider mt-1">Modules</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 opacity-60 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
</body></html>
