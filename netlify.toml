[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  # Supabase URL and anon key are designed for public client-side use.
  # APP_URL, ALLOWED_ORIGINS, EMAIL_SERVICE, SENDER_EMAIL, ENV, and
  # SMS/M-Pesa non-secret config values are safe to appear in the bundle.
  # Truly secret keys (SendGrid, SMS API key, M-Pesa secrets, Redis) are
  # stripped from the client build in vite.config.ts so they never reach
  # the bundle — they do NOT need to be listed here.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_APP_URL,VITE_ALLOWED_ORIGINS,VITE_EMAIL_SERVICE,VITE_SENDER_EMAIL,VITE_ENV,VITE_SMS_PARTNER_ID,VITE_SMS_SHORTCODE,VITE_MPESA_SHORTCODE,VITE_MPESA_CALLBACK_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
